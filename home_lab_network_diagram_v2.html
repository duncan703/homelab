<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Lab Network Diagram</title>
<style>
  :root {
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #555;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-background-secondary: #f5f5f3;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e6dc;
      --color-text-secondary: #9c9a92;
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-background-secondary: #2c2c2a;
    }
    body { background: #1a1a18; }
  }
  body {
    margin: 0;
    padding: 24px;
    font-family: var(--font-sans);
    background: #f9f8f5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin: 0 0 8px;
  }
  p {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin: 0 0 24px;
  }
  .card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--color-border-tertiary);
    padding: 24px;
    max-width: 720px;
    width: 100%;
  }
  @media (prefers-color-scheme: dark) {
    .card { background: #232321; }
  }

  /* SVG theme classes */
  .t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  .arr { stroke: var(--color-text-secondary); stroke-width: 1.5; fill: none; }
  .leader { stroke: var(--color-border-tertiary); stroke-width: 0.5; stroke-dasharray: 4 4; fill: none; }

  /* Color ramps */
  .c-blue  rect, .c-blue  circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue  .th, .c-blue  .t { fill: #0C447C; }
  .c-blue  .ts { fill: #185FA5; }
  .c-teal  rect, .c-teal  circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal  .th, .c-teal  .t { fill: #085041; }
  .c-teal  .ts { fill: #0F6E56; }
  .c-gray  rect, .c-gray  circle { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray  .th, .c-gray  .t { fill: #444441; }
  .c-gray  .ts { fill: #5F5E5A; }
  .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th, .c-purple .t { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  .c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th, .c-coral .t { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  @media (prefers-color-scheme: dark) {
    .c-blue  rect, .c-blue  circle { fill: #0C447C; stroke: #85B7EB; }
    .c-blue  .th, .c-blue  .t { fill: #B5D4F4; }
    .c-blue  .ts { fill: #85B7EB; }
    .c-teal  rect, .c-teal  circle { fill: #085041; stroke: #5DCAA5; }
    .c-teal  .th, .c-teal  .t { fill: #9FE1CB; }
    .c-teal  .ts { fill: #5DCAA5; }
    .c-gray  rect, .c-gray  circle { fill: #444441; stroke: #B4B2A9; }
    .c-gray  .th, .c-gray  .t { fill: #D3D1C7; }
    .c-gray  .ts { fill: #B4B2A9; }
    .c-purple rect, .c-purple circle { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple .th, .c-purple .t { fill: #CECBF6; }
    .c-purple .ts { fill: #AFA9EC; }
    .c-coral rect, .c-coral circle { fill: #712B13; stroke: #F0997B; }
    .c-coral .th, .c-coral .t { fill: #F5C4B3; }
    .c-coral .ts { fill: #F0997B; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>Home Lab — Network Diagram</h1>
  <p>Duncan Kelley · TecMojo 6U rack · Seattle, WA</p>

  <svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Internet -->
    <g class="c-blue">
      <rect x="250" y="20" width="180" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Internet (T-Mobile)</text>
    </g>

    <line x1="340" y1="64" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

    <!-- Beryl AX -->
    <g class="c-teal">
      <rect x="210" y="108" width="260" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">GL-MT3000 Beryl AX</text>
      <text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central">Bridge mode · Wi-Fi 6 · AX3000</text>
    </g>

    <line x1="340" y1="164" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="358" y="190" dominant-baseline="central">LAN → WAN</text>

    <!-- ER605 -->
    <g class="c-teal">
      <rect x="210" y="208" width="260" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="228" text-anchor="middle" dominant-baseline="central">TP-Link ER605</text>
      <text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central">Wired router · VLAN · firewall</text>
    </g>

    <line x1="340" y1="264" x2="340" y2="308" class="arr" marker-end="url(#arrow)"/>
    <text class="ts" x="358" y="290" dominant-baseline="central">LAN out</text>

    <!-- Keystone -->
    <g class="c-gray">
      <rect x="210" y="308" width="260" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="330" text-anchor="middle" dominant-baseline="central">Keystone patch panel</text>
    </g>

    <line x1="340" y1="352" x2="340" y2="396" class="arr" marker-end="url(#arrow)"/>

    <!-- Switch -->
    <g class="c-teal">
      <rect x="180" y="396" width="320" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="416" text-anchor="middle" dominant-baseline="central">TL-SG2008P Managed Switch</text>
      <text class="ts" x="340" y="436" text-anchor="middle" dominant-baseline="central">8-port gigabit · PoE · managed</text>
    </g>

    <!-- Fan out -->
    <line x1="240" y1="452" x2="130" y2="510" class="arr" marker-end="url(#arrow)"/>
    <line x1="340" y1="452" x2="340" y2="510" class="arr" marker-end="url(#arrow)"/>
    <line x1="440" y1="452" x2="560" y2="510" class="arr" marker-end="url(#arrow)"/>

    <!-- Node 1 -->
    <g class="c-purple">
      <rect x="20" y="510" width="220" height="76" rx="8" stroke-width="0.5"/>
      <text class="th" x="130" y="530" text-anchor="middle" dominant-baseline="central">M920Q — Node 1</text>
      <text class="ts" x="130" y="550" text-anchor="middle" dominant-baseline="central">Windows 10</text>
      <text class="ts" x="130" y="568" text-anchor="middle" dominant-baseline="central">Ubuntu Server</text>
    </g>

    <!-- Node 2 -->
    <g class="c-purple">
      <rect x="230" y="510" width="220" height="76" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="530" text-anchor="middle" dominant-baseline="central">M920Q — Node 2</text>
      <text class="ts" x="340" y="550" text-anchor="middle" dominant-baseline="central">Windows Server 2022</text>
      <text class="ts" x="340" y="568" text-anchor="middle" dominant-baseline="central">Wazuh SIEM</text>
    </g>

    <!-- CalDigit -->
    <g class="c-coral">
      <rect x="440" y="510" width="200" height="76" rx="8" stroke-width="0.5"/>
      <text class="th" x="540" y="530" text-anchor="middle" dominant-baseline="central">CalDigit TS3+ dock</text>
      <text class="ts" x="540" y="550" text-anchor="middle" dominant-baseline="central">MacBook</text>
      <text class="ts" x="540" y="568" text-anchor="middle" dominant-baseline="central">Main workstation</text>
    </g>

    <!-- TecMojo label -->
    <rect x="30" y="290" width="130" height="30" rx="6" fill="none" stroke-width="0.5" stroke="#B4B2A9"/>
    <text class="ts" x="95" y="308" text-anchor="middle" dominant-baseline="central">TecMojo 6U rack</text>
    <line x1="160" y1="305" x2="210" y2="325" class="leader"/>
  </svg>
</div>
</body>
</html>
